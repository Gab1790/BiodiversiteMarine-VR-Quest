<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biodiversite Marine - VR Quest</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-environment-component@1.3.5/dist/aframe-environment-component.min.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    #info-overlay {
      position: fixed;
      bottom: 400px;
      left: 50%;
      bottom: 34px;
      transform: translateX(-50%);
      width: min(520px, calc(100vw - 32px));
      box-sizing: border-box;
      display: none;
      z-index: 1000;
      padding: 18px 22px;
      color: #e0f4ff;
      background: rgba(0, 20, 60, 0.9);
      border: 1px solid rgba(0, 170, 255, 0.65);
      border-radius: 12px;
      box-shadow: 0 0 22px rgba(0, 170, 255, 0.35);
      pointer-events: none;
      line-height: 1.45;
    }

    #info-overlay h2 {
      margin: 0 0 8px;
      color: #00d4ff;
      font-size: 20px;
    }

    #info-overlay p {
      margin: 0;
      font-size: 15px;
    }

    #ui-hint,
    #speed-control {
      position: fixed;
      z-index: 1001;
      color: #fff;
      background: rgba(0, 20, 60, 0.78);
      border: 1px solid rgba(0, 170, 255, 0.45);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.22);
    }

    #ui-hint {
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 9px 16px;
      border-radius: 22px;
      font-size: 14px;
      white-space: nowrap;
    }

    #speed-control {
      top: 16px;
      right: 16px;
      width: 180px;
      padding: 12px;
      border-radius: 10px;
    }

    #speed-control label {
      display: block;
      margin-bottom: 8px;
      color: #bfefff;
      font-size: 12px;
      font-weight: 600;
    }

    #speed-slider {
      width: 100%;
      cursor: pointer;
    }

    @media (max-width: 680px) {
      #ui-hint {
        left: 12px;
        right: 12px;
        transform: none;
        white-space: normal;
        text-align: center;
      }

      #speed-control {
        top: 64px;
        right: 12px;
        width: 150px;
      }
    }
  </style>
  <script>
    window.speedMultiplier = window.speedMultiplier || 1;

    const ANIMALS = {
      dolphin: {
        name: "Grand Dauphin (Tursiops truncatus)",
        text: "Mammifère marin très intelligent vivant en groupes sociaux (pods). Il communique grâce à des clics et sifflements ultrasoniques (écholocalisation). Vitesse max : 55 km/h. Espérance de vie : 40-50 ans. Présent dans tous les océans tempérés et tropicaux."
      },
      whale: {
        name: "Baleine à Bosse (Megaptera novaeangliae)",
        text: "Cétacé à fanons mesurant jusqu'à 16 m et pesant 30 tonnes. Célèbre pour ses chants complexes et ses acrobaties (breach). Elle migre chaque année entre zones d'alimentation polaires et zones de reproduction tropicales. Classée espèce vulnérable."
      },
      shark: {
        name: "Grand Requin Blanc (Carcharodon carcharias)",
        text: "Prédateur apex des océans, atteignant 6 m de long. Doté de 300 dents triangulaires renouvelables. Son sens de l'électroréception détecte les champs électriques à plusieurs mètres. Espèce vulnérable menacée par la pêche accidentelle."
      },
      turtle: {
        name: "Tortue Verte (Chelonia mydas)",
        text: "Reptile marin herbivore pouvant vivre plus de 80 ans. Les femelles reviennent pondre sur la plage de leur naissance (navigation magnétique). Elle joue un rôle clé dans les écosystèmes d'herbiers marins. Classée espèce en danger sur la liste rouge UICN."
      },
      octopus: {
        name: "Pieuvre Commune (Octopus vulgaris)",
        text: "Mollusque céphalopode doté de 8 bras couverts de ventouses. Animal le plus intelligent parmi les invertébrés : il ouvre des bocaux, mémorise des parcours et joue. Peut changer de couleur et de texture en millisecondes. Durée de vie : 1-2 ans."
      },
      clownfish: {
        name: "Poisson Clown (Amphiprioninae)",
        text: "Petit poisson vivant en symbiose avec les anémones de mer. Son mucus le protège des cellules urticantes de l'anémone. Présent dans les eaux tropicales de l'Indo-Pacifique. Rendu célèbre par le film Le Monde de Nemo."
      },
      jellyfish: {
        name: "Méduse (Scyphozoa)",
        text: "Invertébré gélatineux composé à 95% d'eau. Elle se déplace par contractions rythmiques de son ombrelle. Ses tentacules urticants capturent zooplancton et petits poissons. Certaines méduses sont potentiellement immortelles."
      }
    };

    AFRAME.registerGeometry("ellipsoid", {
      schema: {
        width: { default: 1 },
        height: { default: 1 },
        depth: { default: 1 },
        segments: { default: 16 }
      },
      init(data) {
        const geo = new THREE.SphereGeometry(0.5, data.segments, data.segments);
        geo.scale(data.width, data.height, data.depth);
        this.geometry = geo;
      }
    });

    AFRAME.registerPrimitive("a-ellipsoid", {
      defaultComponents: { geometry: { primitive: "ellipsoid" }, material: {} },
      mappings: {
        width: "geometry.width",
        height: "geometry.height",
        depth: "geometry.depth",
        color: "material.color",
        opacity: "material.opacity",
        roughness: "material.roughness",
        metalness: "material.metalness"
      }
    });

    AFRAME.registerComponent("swim", {
      schema: {
        radius: { default: 8 },
        speed: { default: 0.4 },
        yOffset: { default: 0 },
        yAmplitude: { default: 0.3 },
        tilt: { default: 8 },
        vary: { default: false },
        darting: { default: false }
      },
      init() {
        this.angle = Math.random() * Math.PI * 2;
        const pos = this.el.getAttribute("position") || { x: 0, y: 0, z: 0 };
        this.centerX = Number(pos.x) || 0;
        this.centerZ = Number(pos.z) || 0;
        this.baseY = (Number(pos.y) || 0) + this.data.yOffset;
      },
      tick(t, dt) {
        const s = this.data;
        let speed = s.speed;
        let radius = s.radius;

        if (s.darting) {
          const cycle = Math.sin(t / 1200);
          speed *= cycle < -0.55 ? 0.18 : cycle > 0.45 ? 2.2 : 1;
        } else if (s.vary) {
          const factor = Math.max(0.15, (Math.sin(this.angle * 0.8) + 1) / 2);
          speed *= 0.35 + factor;
          radius *= 0.75 + factor * 0.25;
        }

        this.angle += (speed * dt * window.speedMultiplier) / 1000;
        const x = this.centerX + Math.cos(this.angle) * radius;
        const z = this.centerZ + Math.sin(this.angle) * radius;
        const y = this.baseY + Math.sin(this.angle * 1.5) * s.yAmplitude;
        const heading = Math.atan2(Math.cos(this.angle), -Math.sin(this.angle)) * 180 / Math.PI;
        const pitch = Math.sin(this.angle * 1.5) * s.tilt;
        this.el.setAttribute("position", { x, y, z });
        this.el.setAttribute("rotation", { x: pitch, y: heading, z: 0 });
      }
    });

    AFRAME.registerComponent("bubble-rise", {
      schema: { speed: { default: 0.6 } },
      init() {
        this.startY = -4.2 - Math.random() * 0.8;
        this.reset();
      },
      reset() {
        this.el.setAttribute("position", {
          x: (Math.random() - 0.5) * 28,
          y: this.startY,
          z: (Math.random() - 0.5) * 28
        });
      },
      tick(t, dt) {
        const pos = this.el.getAttribute("position");
        pos.y += this.data.speed * dt * window.speedMultiplier / 1000;
        pos.x += Math.sin(t / 900 + pos.z) * 0.0015 * dt;
        if (pos.y > 5.8) this.reset();
        else this.el.setAttribute("position", pos);
      }
    });

    AFRAME.registerComponent("jelly-pulse", {
      schema: { speed: { default: 1.5 }, glow: { default: false } },
      init() {
        this.acc = 0;
        this.light = this.el.parentElement.querySelector("a-light");
      },
      tick(t, dt) {
        this.acc += dt * window.speedMultiplier / 1000;
        const wave = Math.sin(this.acc * this.data.speed);
        const scale = 0.9 + wave * 0.1;
        this.el.setAttribute("scale", `${scale} ${scale} ${scale}`);
        if (this.data.glow && this.light) {
          const intensity = 1.1 + (wave + 1) * 0.55;
          this.light.setAttribute("light", "intensity", intensity);
          this.el.setAttribute("material", "emissiveIntensity", intensity);
        }
      }
    });

    AFRAME.registerComponent("ray-glide", {
      schema: { speed: { default: 0.35 }, scaleX: { default: 10 }, scaleZ: { default: 6 } },
      init() {
        this.acc = Math.random() * Math.PI * 2;
        const pos = this.el.getAttribute("position") || { y: -1 };
        this.baseY = Number(pos.y) || -1;
      },
      tick(t, dt) {
        this.acc += dt * window.speedMultiplier * this.data.speed / 1000;
        const a = this.acc;
        const x = Math.sin(a) * this.data.scaleX;
        const z = Math.sin(a * 2) * this.data.scaleZ;
        const y = this.baseY + Math.sin(a * 0.7) * 0.45;
        const heading = Math.atan2(Math.cos(a), -Math.cos(a * 2) * 2) * 180 / Math.PI;
        this.el.setAttribute("position", { x, y, z });
        this.el.setAttribute("rotation", { x: 0, y: heading, z: 0 });
      }
    });

    window.isVRActive = false;

    window.addEventListener("DOMContentLoaded", () => {
      const slider = document.getElementById("speed-slider");
      if (slider) {
        slider.addEventListener("input", (e) => {
          window.speedMultiplier = parseFloat(e.target.value);
        });
      }

      window.addEventListener("click", () => {
        const soundEl = document.querySelector("#bg-sound");
        if (soundEl && soundEl.components.sound) soundEl.components.sound.playSound();
      }, { once: true });

      const scene = document.querySelector("a-scene");
      if (scene) {
        scene.addEventListener("enter-vr", () => { window.isVRActive = true; });
        scene.addEventListener("exit-vr",  () => { window.isVRActive = false; });
      }
    });
  </script>
</head>
<body>
  <div id="ui-hint">Regardez un animal pour lire sa fiche. Cliquez pour la figer.</div>
  <div id="speed-control">
    <label for="speed-slider">Vitesse de la vie marine</label>
    <input type="range" id="speed-slider" min="0" max="3" step="0.1" value="1" />
  </div>
  <div id="info-overlay">
    <h2 id="info-name"></h2>
    <p id="info-text"></p>
  </div>

  <a-scene
    webxr="referenceSpaceType: local-floor; optionalFeatures: hand-tracking"
    renderer="colorManagement: true; physicallyCorrectLights: true"
    raycaster="objects: .clickable"
    fog="type: exponential; color: #001a3a; density: 0.012"
    background="color: #000033"
  >
    <a-assets>
      <a-asset-item id="dolphin-obj" src="pack/OBJ/Dolphin.obj"></a-asset-item>
      <a-asset-item id="dolphin-mtl" src="pack/OBJ/Dolphin.mtl"></a-asset-item>
      <a-asset-item id="shark-obj" src="pack/OBJ/Shark.obj"></a-asset-item>
      <a-asset-item id="shark-mtl" src="pack/OBJ/Shark.mtl"></a-asset-item>
      <a-asset-item id="whale-obj" src="pack/OBJ/Whale.obj"></a-asset-item>
      <a-asset-item id="whale-mtl" src="pack/OBJ/Whale.mtl"></a-asset-item>

      <a-asset-item id="fish1-obj" src="pack/OBJ/Fish1.obj"></a-asset-item>
      <a-asset-item id="fish1-mtl" src="pack/OBJ/Fish1.mtl"></a-asset-item>
      <a-asset-item id="fish2-obj" src="pack/OBJ/Fish2.obj"></a-asset-item>
      <a-asset-item id="fish2-mtl" src="pack/OBJ/Fish2.mtl"></a-asset-item>
      <a-asset-item id="fish3-obj" src="pack/OBJ/Fish3.obj"></a-asset-item>
      <a-asset-item id="fish3-mtl" src="pack/OBJ/Fish3.mtl"></a-asset-item>
      <a-asset-item id="octopus-obj" src="pack/octopus/Octopus.obj"></a-asset-item>
      <a-asset-item id="octopus-mtl" src="pack/octopus/Octopus.mtl"></a-asset-item>
      <a-asset-item id="jellyfish-obj" src="pack/jellyfish/NOVELO_JELLYFISH.obj"></a-asset-item>
      <a-asset-item id="jellyfish-mtl" src="pack/jellyfish/NOVELO_JELLYFISH.mtl"></a-asset-item>
      <a-asset-item id="turtle-obj" src="pack/turtle/NOVELO_TURTLE.obj"></a-asset-item>
      <a-asset-item id="turtle-mtl" src="pack/turtle/NOVELO_TURTLE.mtl"></a-asset-item>
      <audio id="ambient-sound" src="https://cdn.aframe.io/basic-guide/audio/backgroundnoise.wav" preload="auto" crossorigin="anonymous"></audio>
    </a-assets>

    <a-entity id="bg-sound" sound="src: #ambient-sound; autoplay: false; loop: true; volume: 0.45; positional: false; poolSize: 5"></a-entity>
    <!-- ══════════════════════════════════════════════════
         CUSTOM COMPONENTS
    ══════════════════════════════════════════════════ -->
    <script>
      /* ---- Face camera component ---- */
      AFRAME.registerComponent('face-camera', {
        init() {
          this.camPos = new THREE.Vector3();
          this.objPos = new THREE.Vector3();
        },
        tick() {
          const camera = this.el.sceneEl.camera;
          if (!camera) return;
          camera.getWorldPosition(this.camPos);
          this.el.object3D.getWorldPosition(this.objPos);
          this.camPos.y = this.objPos.y;
          this.el.object3D.lookAt(this.camPos);
        }
      });

      /* ---- Info panel component ---- */
      AFRAME.registerComponent('animal-info', {
        schema: { type: 'string', default: '' },
        init() {
          this.shared = this.ensureSharedPanel();
          this.panelVisible = false;
          this._isIntersected = false;
          this._interactionBound = false;
          this._htmlOverlay = document.getElementById('info-overlay');
          this._htmlName = document.getElementById('info-name');
          this._htmlText = document.getElementById('info-text');
          this.bindInteractionListeners(this.el);
          this.bindInteractionTargets();
          if (!this.el.hasLoaded) {
            this.el.addEventListener('loaded', () => {
              this.bindInteractionTargets();
            });
          }
        },
        ensureSharedPanel() {
          const scene = this.el.sceneEl;
          if (!scene) return null;
          if (scene.__animalInfoShared) return scene.__animalInfoShared;

          const panel = document.createElement('a-entity');
          panel.setAttribute('visible', 'false');

          const bg = document.createElement('a-plane');
          const bgWidthBase = 1.8;
          const bgHeightBase = 1.15;
          bg.setAttribute('width', String(bgWidthBase));
          bg.setAttribute('height', String(bgHeightBase));
          bg.setAttribute('material', 'color: #001a3a; opacity: 0.9; transparent: true; side: double; shader: flat; depthTest: false; depthWrite: false');
          panel.appendChild(bg);

          const titleEl = document.createElement('a-text');
          const titleWidthBase = 1.65;
          titleEl.setAttribute('color', '#00d4ff');
          titleEl.setAttribute('align', 'left');
          titleEl.setAttribute('width', String(titleWidthBase));
          titleEl.setAttribute('wrap-count', '28');
          titleEl.setAttribute('position', `-${(titleWidthBase/2 - 0.15).toFixed(2)} ${ (bgHeightBase/2 - 0.18).toFixed(2)} 0.01`);
          titleEl.setAttribute('font', 'dejavu');
          titleEl.setAttribute('material', 'shader: flat; side: double; transparent: true; depthTest: false; depthWrite: false');
          panel.appendChild(titleEl);

          const textEl = document.createElement('a-text');
          const textWidthBase = 1.65;
          textEl.setAttribute('color', '#e0f4ff');
          textEl.setAttribute('align', 'left');
          textEl.setAttribute('width', String(textWidthBase));
          textEl.setAttribute('wrap-count', '40');
          textEl.setAttribute('line-height', '50');
          textEl.setAttribute('position', `-${(textWidthBase/2 - 0.15).toFixed(2)} ${ (bgHeightBase/2 - 0.52).toFixed(2)} 0.01`);
          textEl.setAttribute('font', 'dejavu');
          textEl.setAttribute('material', 'shader: flat; side: double; transparent: true; depthTest: false; depthWrite: false');
          panel.appendChild(textEl);

          panel.object3D.renderOrder = 1100;
          // Attach panel to camera so it acts as a fixed HUD, always visible in front of the user
          const cameraEl = scene.querySelector('a-camera') || scene.querySelector('[camera]');
          if (cameraEl) {
            cameraEl.appendChild(panel);
          } else {
            scene.appendChild(panel);
          }
          // Fixed position relative to camera: bottom of field of view, 1.8 m ahead
          panel.setAttribute('position', '0 -0.85 -1.8');
          panel.setAttribute('scale', '0.65 0.65 0.65');

          scene.__animalInfoShared = {
            panel,
            bg,
            bgWidthBase,
            bgHeightBase,
            titleEl,
            titleWidthBase,
            textEl,
            textWidthBase,
            activeEl: null
          };
          return scene.__animalInfoShared;
        },
        hideSharedPanel() {
          if (!this.shared || !this.shared.panel) return;
          this.panelVisible = false;
          if (this.shared.activeEl === this.el) {
            this.shared.activeEl = null;
            this.shared.panel.setAttribute('visible', 'false');
          }
        },
        setSharedText() {
          if (!this.shared) return;
          const d = ANIMALS[this.data];
          if (!d) return;
          this.shared.titleEl.setAttribute('value', d.name);
          this.shared.textEl.setAttribute('value', d.text);
        },
        bindInteractionListeners(target) {
          target.addEventListener('mouseenter', () => this.show());
          target.addEventListener('mouseleave', () => this.hide());
          target.addEventListener('click',      () => this.show());
          target.addEventListener('pointerenter', () => this.show());
          target.addEventListener('pointerleave', () => this.hide());
          target.addEventListener('pointerdown',  () => this.show());
          target.addEventListener('pointerup',    () => this.hide());
          target.addEventListener('touchstart', (e) => { e.stopPropagation(); this.show(); }, { passive: true });
          target.addEventListener('touchend',   (e) => { e.stopPropagation(); this.hide(); }, { passive: true });
          target.addEventListener('raycaster-intersected', () => {
            this._isIntersected = true;
            this.show();
          });
          target.addEventListener('raycaster-intersected-cleared', () => {
            this._isIntersected = false;
            this.hide();
          });
        },
        bindInteractionTargets() {
          if (this._interactionBound) return;
          this._interactionBound = true;
          this.el.classList.add('clickable');
          const children = this.el.querySelectorAll('*');
          children.forEach((child) => {
            child.classList.add('clickable');
            this.bindInteractionListeners(child);
          });
        },
        update() {
          if (this.shared && this.shared.activeEl === this.el) {
            this.setSharedText();
          }
        },
        updateSharedLayout(dist) {
          if (!this.shared) return;
          const s = this.shared;
          // scale increases with distance (animals far away get larger panels)
          const base = 1.0;
          const scale = Math.min(2.5, Math.max(0.9, base + (dist - 3.0) * 0.18));
          const bgW = s.bgWidthBase * scale;
          const bgH = s.bgHeightBase * scale;
          s.bg.setAttribute('width', String(bgW));
          s.bg.setAttribute('height', String(bgH));
          // compute left offset for text elements (small padding)
          const left = -(bgW / 2) + 0.12;
          const titleY = (bgH / 2) - 0.18;
          const textY = titleY - 0.42 * scale;
          s.titleEl.setAttribute('width', String(s.titleWidthBase * scale));
          s.titleEl.setAttribute('position', `${left.toFixed(3)} ${titleY.toFixed(3)} 0.01`);
          s.textEl.setAttribute('width', String(s.textWidthBase * scale));
          s.textEl.setAttribute('position', `${left.toFixed(3)} ${textY.toFixed(3)} 0.01`);
        },
        show() {
          clearTimeout(this._hideTimer);
          this.setSharedText();
          const d = ANIMALS[this.data];
          if (window.isVRActive) {
            // VR mode: show the 3D panel attached to the camera
            if (this.shared && this.shared.panel) {
              this.panelVisible = true;
              this.shared.activeEl = this.el;
              this.shared.panel.setAttribute('visible', 'true');
              this.updateSharedLayout(3.0);
            }
          } else {
            // Desktop mode: show the HTML overlay only
            if (d && this._htmlOverlay) {
              this._htmlName.textContent = d.name;
              this._htmlText.textContent = d.text;
              this._htmlOverlay.style.display = 'block';
            }
          }
        },
        hide() {
          if (this._isIntersected) return;
          clearTimeout(this._hideTimer);
          this._hideTimer = setTimeout(() => {
            if (this._htmlOverlay) this._htmlOverlay.style.display = 'none';
            this.hideSharedPanel();
          }, 3000);
        },
        remove() {
          clearTimeout(this._hideTimer);
          this.hideSharedPanel();
        }
      });

      /* ---- Color boost component ---- */
      AFRAME.registerComponent('color-boost', {
        schema: { saturation: { default: 0.2 }, lightness: { default: 0.08 } },
        init() {
          this.apply = this.apply.bind(this);
          if (this.el.hasLoaded) {
            this.apply();
          } else {
            this.el.addEventListener('loaded', this.apply);
          }
        },
        apply() {
          if (this._applied) return;
          this._applied = true;
          const { saturation, lightness } = this.data;
          const lowSaturationThreshold = 0.1;
          const lowSaturationMultiplier = 0.4; // Softer boost for near-neutral colors to avoid harsh tints.
          this.el.object3D.traverse((obj) => {
            if (obj.el && obj.el.dataset && obj.el.dataset.ui === 'info') return;
            if (!obj.isMesh || !obj.material) return;
            const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
            materials.forEach((material) => {
              if (!material || !material.color) return;
              const hsl = { h: 0, s: 0, l: 0 };
              material.color.getHSL(hsl);
              const sBoost = hsl.s > lowSaturationThreshold
                ? saturation
                : saturation * lowSaturationMultiplier;
              material.color.setHSL(
                hsl.h,
                Math.min(1, hsl.s + sBoost),
                Math.min(1, hsl.l + lightness)
              );
              material.needsUpdate = true;
            });
          });
        }
      });

      /* ---- Smooth swim animation component ---- */
      AFRAME.registerComponent('swim', {
        schema: {
          radius:    { default: 8 },
          speed:     { default: 0.4 },
          yOffset:   { default: 0 },
          yAmplitude:{ default: 0.3 },
          tilt:      { default: 8 }
        },
        init() {
          this.angle = Math.random() * Math.PI * 2;
          this.baseY = parseFloat(this.el.getAttribute('position').y) || 0;
        },
        tick(t, dt) {
          const s = this.data;
          this.angle += (s.speed * dt) / 1000;
          const x  = Math.cos(this.angle) * s.radius;
          const z  = Math.sin(this.angle) * s.radius;
          const y  = this.baseY + Math.sin(this.angle * 1.5) * s.yAmplitude;
          this.el.setAttribute('position', { x, y, z });
          const heading = (Math.atan2(Math.cos(this.angle), -Math.sin(this.angle)) * 180 / Math.PI);
          const pitch   = Math.sin(this.angle * 1.5) * s.tilt;
          this.el.setAttribute('rotation', { x: pitch, y: heading, z: 0 });
        }
      });

      /* ---- Tail wag component ---- */
      AFRAME.registerComponent('tail-wag', {
        schema: { speed: { default: 3 }, amplitude: { default: 20 } },
        tick(t) {
          const angle = Math.sin(t / 1000 * this.data.speed) * this.data.amplitude;
          this.el.setAttribute('rotation', { x: 0, y: angle, z: 0 });
        }
      });

      /* ---- Bubble rise ---- */
      AFRAME.registerComponent('bubble-rise', {
        schema: { speed: { default: 0.6 } },
        init() {
          this.startY = parseFloat(this.el.getAttribute('position').y) || -4;
          this.el.setAttribute('position', {
            x: (Math.random() - 0.5) * 20,
            y: this.startY,
            z: (Math.random() - 0.5) * 20
          });
        },
        tick(t, dt) {
          const pos = this.el.getAttribute('position');
          pos.y += this.data.speed * dt / 1000;
          if (pos.y > 6) {
            pos.y = this.startY;
            pos.x = (Math.random() - 0.5) * 20;
            pos.z = (Math.random() - 0.5) * 20;
          }
          this.el.setAttribute('position', pos);
        }
      });

      /* ---- Jellyfish pulse ---- */
      AFRAME.registerComponent('jelly-pulse', {
        schema: { speed: { default: 1.5 } },
        tick(t) {
          const s = 0.9 + Math.sin(t / 1000 * this.data.speed) * 0.1;
          this.el.setAttribute('scale', `${s} ${s} ${s}`);
        }
      });

      /* ---- Ray glide (figure-8) ---- */
      AFRAME.registerComponent('ray-glide', {
        schema: { speed: { default: 0.35 }, scaleX: { default: 10 }, scaleZ: { default: 6 } },
        init() {
          this.t0 = Math.random() * Math.PI * 2;
          this.baseY = parseFloat(this.el.getAttribute('position').y) || -1;
        },
        tick(t) {
          const a  = t / 1000 * this.data.speed + this.t0;
          const x  = Math.sin(a) * this.data.scaleX;
          const z  = Math.sin(a * 2) * this.data.scaleZ;
          const y  = this.baseY + Math.sin(a * 0.7) * 0.4;
          this.el.setAttribute('position', { x, y, z });
          const heading = Math.atan2(Math.cos(a), -Math.cos(a * 2) * 2) * 180 / Math.PI;
          this.el.setAttribute('rotation', { x: 0, y: heading, z: 0 });
        }
      });
    </script>
